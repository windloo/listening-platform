server:
  port: 10000
spring:
  application:
    name: identity-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/windloo_identity?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        namespace: ${spring.profiles.active:public}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
      eager: true
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
seata:
  enabled: false
  tx-service-group: windloo_tx_group
  service:
    vgroup-mapping:
      windloo_tx_group: default
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:windloo}
  expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
identity:
  lockout:
    max-attempts: 5
    lock-minutes: 15
  reset-code:
    ttl-seconds: 300