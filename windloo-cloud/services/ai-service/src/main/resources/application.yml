server:
  port: 15000
spring:
  application:
    name: ai-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/windloo_ai?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        namespace: ${spring.profiles.active:public}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
      eager: true
  ai:
    openai:
      base-url: ${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/plan/v3}
      api-key: ${ARK_API_KEY:dummy}
      chat:
        options:
          model: ${ARK_MODEL:ark-code-latest}
          temperature: 0.7
        completions-path: /chat/completions
      embedding:
        embeddings-path: /embeddings
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
seata:
  enabled: false
  tx-service-group: windloo_tx_group
  service:
    vgroup-mapping:
      windloo_tx_group: default
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
ai:
  system-prompt: "You are windloo, an English learning tutor. Help with grammar, vocabulary, usage, translation and writing. Be concise and friendly. Reply in the user's language."
  context:
    max-messages: 10
  quota:
    daily-per-user: 0
