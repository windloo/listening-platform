services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: windloo_identity
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports: ["3306:3306"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, retries: 20 }

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
    ports: ["8848:8848","9848:9848"]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      retries: 30

  zipkin:
    image: openzipkin/zipkin:3.4
    ports: ["9411:9411"]

  seata-server:
    image: apache/seata-server:2.1.0
    environment:
      STORE_MODE: file
    ports: ["8091:8091","7091:7091"]

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: services/identity-service
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      NACOS_HOST: nacos
      ZIPKIN_HOST: zipkin
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS}
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    profiles: ["app"]

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    environment:
      NACOS_HOST: nacos
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      identity-service: { condition: service_started }
    ports: ["80:80"]
    profiles: ["app"]

volumes:
  mysql_data: